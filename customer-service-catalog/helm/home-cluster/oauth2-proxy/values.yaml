namespace:
  labels:
    project-name: "home-cluster"
    stage: "prod"


externalSecrets:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-store

  secretStores:
    home-cluster-prod:
      kind: ClusterSecretStore
      name: bitwarden-store

  secrets:
    oauth2-credentials:
      secretStoreRef: home-cluster-prod
      dataFrom:
        - remoteKey: oauth2_credentials


oauth2-proxy:
  imagePullSecrets:
    - name: image-pull-secret
  config:
    existingSecret: oauth2-credentials
    configFile: |-
      reverse_proxy = true
      redirect_url = "https://home.yourdomain.com/oauth2/callback"
      email_domains = [ "*" ]
      cookie_secure = true
      upstreams = [ "static://200" ]
      github_org = "<no value>"
      github_team = "<no value>"
      provider = "github"
      scope = "read:user user:email read:org"
  ingress:
    className: traefik
    annotations:

      cert-manager.io/cluster-issuer: letsencrypt-staging
    enabled: true
    path: /oauth2
    pathType: Prefix
    hosts:
      - home.yourdomain.com
    tls:
      - secretName: tls-oauth2-proxy
        hosts:
          - home.yourdomain.com
  metrics:
    serviceMonitor:
      enabled: true
      labels:
        monitoring.instance: "home-cluster-prod"


middleware:
  name: oauth-auth
  namespace: oauth2-proxy

  forwardAuth:
    address: http://oauth2-proxy.oauth2-proxy.svc.cluster.local/oauth2/
    trustForwardHeader: true

    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - Authorization
