{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-git-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: argocd-git-creds
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: "ARGOCD_GIT_PAT" # Name of the secret in Bitwarden
---
