{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-git-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: argocd-git-creds
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: "ARGOCD_GIT_PAT" # Name of the secret in Bitwarden
---
{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
  - secretKey: POSTGRES_PASSWORD
    remoteRef:
      key: "POSTGRES_PASSWORD"
{{- end }}
---
{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: n8n-secret
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: n8n-secret
    creationPolicy: Owner
  data:
  - secretKey: N8N_ENCRYPTION_KEY
    remoteRef:
      key: "N8N_ENCRYPTION_KEY"
{{- end }}
---
{{- if .Values.enabled }}
# --- Global Image Pull Secret (Syncs to all namespaces) ---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: global-image-pull-secret
spec:
  externalSecretName: image-pull-secret
  namespaceSelector:
    matchLabels:
      project-name: home-cluster
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: bitwarden-store
      kind: ClusterSecretStore
    target:
      name: image-pull-secret
      template:
        type: kubernetes.io/dockerconfigjson
    data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: "GLOBAL_DOCKER_CONFIG" # Store your full JSON config in Bitwarden
{{- end }}
---
{{- if .Values.enabled }}
# --- Monitoring Webhooks ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-webhooks
  namespace: monitoring-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-webhooks
  data:
  - secretKey: msteams-webhook-url
    remoteRef:
      key: "MONITORING_TEAMS_WEBHOOK"
  - secretKey: uptimerobot-webhook-url
    remoteRef:
      key: "MONITORING_UPTIMEROBOT_WEBHOOK"
{{- end }}
