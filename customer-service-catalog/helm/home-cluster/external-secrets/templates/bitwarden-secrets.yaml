{{- if .Values.enabled }}
# --- Global Image Pull Secret (Syncs to all namespaces) ---
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: global-image-pull-secret
spec:
  externalSecretName: image-pull-secret
  namespaceSelector:
    matchLabels:
      project-name: home-cluster
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: bitwarden-store
      kind: ClusterSecretStore
    target:
      name: image-pull-secret
      template:
        type: kubernetes.io/dockerconfigjson
    data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: "GLOBAL_DOCKER_CONFIG" # Store your full JSON config in Bitwarden
{{- end }}
---
