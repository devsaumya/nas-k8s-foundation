apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-auth
  namespace: network-system
spec:
  forwardAuth:
    address: http://authelia.identity-system.svc.cluster.local:9091/api/verify?rd=https://auth.{{ .Values.domain }}/
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
