namespace:
  labels:
    project-name: "home-cluster"
    stage: "prod"

velero:
  configuration:
    provider: aws
    backupStorageLocation:
      name: default
      bucket: velero
      config:
        region: minio
        s3ForcePathStyle: true
        s3Url: http://192.168.1.10:9000
    volumeSnapshotLocation:
      name: default
      config:
        region: minio
  credentials:
    existingSecret: velero-minio-credentials
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.8.0
      volumeMounts:
        - mountPath: /plugins
          name: plugins
